<!DOCTYPE html>
<html>
<head>
  <title>Mercado - Mangotex</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: white;
      color: black;
      text-align: center;
    }

    h1 {
      margin: 40px;
    }

    .contenedor {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .producto {
      width: 250px;
      text-align: left;
    }

    .producto img {
      width: 100%;
      border-radius: 10px;
    }

    .producto h3 {
      font-size: 16px;
    }

    .producto p {
      font-size: 13px;
      color: gray;
    }

    select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: black;
      color: white;
      border: none;
      margin-top: 15px;
      cursor: pointer;
      letter-spacing: 2px;
    }

    .btn:hover {
      background: #333;
    }

  </style>

</head>

<body>

<h1>MERCADO MANGOTEX 🥭</h1>

<div class="contenedor">

  <!-- PERFUME -->
  <div class="producto">
    <img src="https://via.placeholder.com/250x250?text=Perfume">
    <h3>DECANT DE PERFUME</h3>
    <p>Fragancias premium en presentación pequeña.</p>

    <label>Tamaño</label>
    <select>
      <option>5 ML</option>
      <option>10 ML</option>
    </select>

    <button class="btn">COMPRAR</button>
  </div>

  <!-- CHICLES -->
  <div class="producto">
    <img src="https://via.placeholder.com/250x250?text=Chicles">
    <h3>CHICLES</h3>
    <p>Sabores variados y frescos.</p>

    <label>Presentación</label>
    <select>
      <option>Individual</option>
      <option>Paquete</option>
    </select>

    <button class="btn">COMPRAR</button>
  </div>

  <!-- COHETES -->
  <div class="producto">
    <img src="https://via.placeholder.com/250x250?text=Cohetes">
    <h3>COHETES</h3>
    <p>Para eventos y celebraciones.</p>

    <label>Tipo</label>
    <select>
      <option>Pequeño</option>
      <option>Grande</option>
    </select>

    <button class="btn">COMPRAR</button>
  </div>

</div>

</body>
</html>
