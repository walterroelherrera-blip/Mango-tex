<!DOCTYPE html>
<html>
<head>
  <title>Mango Tex</title>

  <style>
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: black;
      overflow-x: hidden;
    }

    /* FONDO TIPO TU IMAGEN */
    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .line {
      position: absolute;
      width: 200%;
      display: flex;
      gap: 60px;
      transform: rotate(-30deg);
      animation: mover 10s linear infinite;
    }

    /* MUCHAS LINEAS (PARALELAS) */
    .line:nth-child(1){ top: -20%; }
    .line:nth-child(2){ top: 0%; }
    .line:nth-child(3){ top: 20%; }
    .line:nth-child(4){ top: 40%; }
    .line:nth-child(5){ top: 60%; }
    .line:nth-child(6){ top: 80%; }
    .line:nth-child(7){ top: 100%; }

    /* STICKER REAL */
    .sticker {
      width: 90px;
      height: 90px;
      background-image: url('https://cdn-icons-png.flaticon.com/512/590/590685.png');
      background-size: cover;
      border-radius: 20px;
      opacity: 0.15;
    }

    /* MOVIMIENTO DIAGONAL REAL */
    @keyframes mover {
      from { transform: translateX(-50%) rotate(-30deg); }
      to { transform: translateX(0%) rotate(-30deg); }
    }

    nav {
      position: fixed;
      width: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      padding: 15px;
      text-align: center;
      z-index: 1000;
    }

    nav button {
      background: transparent;
      border: 1px solid white;
      color: white;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    nav button:hover {
      background: white;
      color: black;
      transform: scale(1.1);
    }

    section {
      min-height: 100vh;
      padding: 120px 20px;
      opacity: 0;
      transform: translateY(60px);
      transition: 1s;
      text-align: center;
    }

    section.show {
      opacity: 1;
      transform: translateY(0);
    }

    .logo {
      font-size: 60px;
      font-weight: bold;
    }

    .card {
      max-width: 800px;
      margin: 30px auto;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    .icon {
      width: 20px;
      vertical-align: middle;
      margin-right: 8px;
    }

  </style>

  <script>
    window.addEventListener("scroll", () => {
      document.querySelectorAll("section").forEach(sec => {
        let top = window.scrollY;
        let offset = sec.offsetTop - 400;
        if (top > offset) {
          sec.classList.add("show");
        }
      });
    });

    function irA(id){
      document.getElementById(id).scrollIntoView({behavior:"smooth"});
    }

    function login(){
      let u = document.getElementById("user").value;
      let p = document.getElementById("pass").value;

      let users = {
        "DIEGOM1NJ4R3Z": ["MT-26-001","Diego"],
        "JP25004": ["MT-26-002","Juan Pablo"],
        "M1/A64": ["MT-26-003","Mya"],
        "W4LT3RH4": ["MT-26-004","Walter"],
        "CHR1$64BIT": ["MT-2026-005","Christian"]
      };

      if(users[u] && users[u][0] === p){
        let nombre = users[u][1];
        let nueva = window.open("", "_blank");
        nueva.document.write("<h1>Bienvenido " + nombre + " 😎</h1>");
      } else {
        alert("Error ❌");
      }
    }
  </script>

</head>

<body>
