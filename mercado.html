<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mangotex - Mercado</title>

<style>
body{
  font-family: Arial;
  background:black;
  color:white;
  margin:0;
  text-align:center;
}

h1{
  margin:20px;
  font-size:42px;
  letter-spacing:3px;
  text-shadow:0 0 20px rgba(255,255,255,0.3);
}

.back-btn{
  position:fixed;
  top:10px;
  left:10px;
  background:white;
  color:black;
  border:none;
  border-radius:50%;
  width:35px;
  height:35px;
  cursor:pointer;
}

.admin-btn{
  position:fixed;
  top:10px;
  right:10px;
  background:white;
  border:none;
  border-radius:50%;
  width:35px;
  height:35px;
  cursor:pointer;
}

.topbar{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  padding:10px;
}

input{
  padding:8px;
  border-radius:10px;
  border:none;
  width:200px;
}

.contenedor{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.producto{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding:15px;
  border-radius:20px;
  width:220px;
  position:relative;
  transition:0.3s;
}

.producto:hover{
  transform:translateY(-8px);
}

.producto img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:12px;
}

.btn{
  margin-top:8px;
  padding:8px;
  border:none;
  border-radius:15px;
  background:white;
  color:black;
  cursor:pointer;
}

select{
  margin-top:8px;
  padding:5px;
  border-radius:8px;
}

.precio{
  margin-top:5px;
  font-weight:bold;
}

.heart{
  position:absolute;
  top:10px;
  right:10px;
  cursor:pointer;
}

.agotado{
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
}

.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
}

.modal.active{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:#111;
  padding:20px;
  border-radius:15px;
  width:300px;
}

.ofertas{
  margin-top:40px;
  padding:20px;
  border-top:1px solid #333;
}

.oferta{
  background:#111;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

</style>
</head>

<body>

<button class="back-btn" onclick="window.location.href='index.html'">⬅</button>
<button class="admin-btn" onclick="adminMode()">✏️</button>

<h1>Mercado Mangotex</h1>

<div class="topbar">
  <input id="buscador" placeholder="Buscar perfume..." oninput="render()">
  <button onclick="abrirCarrito()">🛒 (<span id="cartCount">0</span>)</button>
</div>

<div class="contenedor" id="perfumes"></div>

<div class="ofertas">
  <h2>Ofertas</h2>
  <div id="ofertasBox"></div>
</div>

<!-- MODAL COMPRA -->
<div id="modalCompra" class="modal">
  <div class="modal-box">
    <h3>Confirmar compra</h3>
    <p id="textoCompra"></p>
    <button onclick="cerrarModal()">Cancelar</button>
    <button onclick="confirmarCompra()">Confirmar</button>
  </div>
</div>

<!-- MODAL CARRITO -->
<div id="cartModal" class="modal">
  <div class="modal-box">
    <h3>Carrito</h3>
    <div id="cartList"></div>
    <button onclick="checkout()">Checkout</button>
    <button onclick="cerrarCart()">Cerrar</button>
  </div>
</div>

<script>

let admin=false;
let productoActual="";
let tamañoActual="";
let cart=[];
let favs=JSON.parse(localStorage.getItem("favs"))||[];
let ofertas=JSON.parse(localStorage.getItem("ofertas"))||[];

let perfumes=JSON.parse(localStorage.getItem("perfumes"))||[];

// PERFUMES ORIGINALES RESTAURADOS
if(perfumes.length===0){
perfumes=[
["Valentino Uomo",100,70,"https://picsum.photos/200"],
["Valentino Intense",120,90,"https://picsum.photos/200"],
["YSL MYSLF",180,165,"https://picsum.photos/200"],
["Nautica Voyage",60,40,"https://picsum.photos/200"],
["Stronger With You",190,190,"https://picsum.photos/200"]
];
}

function save(){
localStorage.setItem("perfumes",JSON.stringify(perfumes));
localStorage.setItem("favs",JSON.stringify(favs));
localStorage.setItem("ofertas",JSON.stringify(ofertas));
}

function render(){
let q=document.getElementById("buscador").value.toLowerCase();
let cont=document.getElementById("perfumes");
cont.innerHTML="";

perfumes.filter(p=>p[0].toLowerCase().includes(q)).forEach((p,i)=>{
cont.innerHTML+=`
<div class='producto'>
<div class='heart' onclick='fav(${i})'>${favs.includes(i)?"❤️":"🤍"}</div>
<img src='${p[3]}'>
<h3>${p[0]}</h3>

<select onchange='precio(this,${p[1]},${p[2]})'>
<option value='10'>10 ML - $${p[1]}</option>
<option value='5'>5 ML - $${p[2]}</option>
</select>

<div class='precio'>$${p[1]}</div>

<button class='btn' onclick='comprar(${i},this)'>COMPRAR</button>
<button class='btn' onclick='addCart(${i})'>AGREGAR</button>
</div>`;
});

document.getElementById("cartCount").innerText=cart.length;
renderOfertas();
}

function precio(sel,p10,p5){
let div=sel.parentElement.querySelector(".precio");
div.innerText=sel.value=="5"?"$"+p5:"$"+p10;
}

function comprar(i,btn){
let sel=btn.parentElement.querySelector("select");
productoActual=perfumes[i][0];
tamañoActual=sel.value;
document.getElementById("textoCompra").innerText=`¿Comprar ${productoActual} ${tamañoActual}ml?`;
document.getElementById("modalCompra").classList.add("active");
}

function cerrarModal(){
document.getElementById("modalCompra").classList.remove("active");
}

function confirmarCompra(){
window.location="https://wa.me/526624637282?text="+encodeURIComponent("Quiero: "+productoActual+" "+tamañoActual+"ml");
}

function addCart(i){
cart.push(perfumes[i][0]);
render();
}

function abrirCarrito(){
document.getElementById("cartModal").classList.add("active");
document.getElementById("cartList").innerHTML=cart.map(p=>"<p>"+p+"</p>").join("");
}

function cerrarCart(){
document.getElementById("cartModal").classList.remove("active");
}

function checkout(){
window.location="https://wa.me/526624637282?text="+encodeURIComponent(cart.join(", "));
}

function fav(i){
if(favs.includes(i))favs=favs.filter(x=>x!==i);
else favs.push(i);
save();render();
}

function adminMode(){
let pass=prompt("Password");
if(pass=="MT-MERCADO2026zz"){
let op=prompt("1 agregar\n2 oferta");
if(op=="1"){
perfumes.push([prompt("nombre"),100,80,prompt("img")]);
}
if(op=="2"){
ofertas.push(prompt("oferta"));
}
save();render();
}
}

function renderOfertas(){
document.getElementById("ofertasBox").innerHTML=
ofertas.map(o=>`<div class='oferta'>🔥 ${o}</div>`).join("");
}

render();

</script>

</body>
</html>
