<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mangotex - Mercado</title>

<style>

  
  body{
  animation: entrada 0.5s ease;
}

@keyframes entrada{
  from{
    opacity:0;
    transform: translateX(60px);
  }
  to{
    opacity:1;
    transform: translateX(0);
  }
}
  

@keyframes entrar{
  from{
    opacity:0;
    transform: translateX(50px);
  }
  to{
    opacity:1;
    transform: translateX(0);
  }
}

  select{
  margin-top:10px;
  padding:8px;
  border-radius:15px;
  border:none;
  outline:none;

  background: rgba(255,255,255,0.1);
  color:white;

  backdrop-filter: blur(10px);

  cursor:pointer;
  transition:0.3s;
}

select:hover{
  box-shadow:0 0 10px rgba(255,255,255,0.3);
}

select:focus{
  box-shadow:0 0 15px rgba(255,255,255,0.5);
}

/* 👇 BONUS VA AQUÍ */
option{
  background:black;
  color:white;
}

.subtitulo{
  margin-top:-10px;
  font-size:14px;
  opacity:0.7;
  letter-spacing:4px;
  text-transform:uppercase;

  animation: glowSub 3s ease-in-out infinite;
}

/* 👇 VA DEBAJO, SEPARADO */
@keyframes glowSub{
  0%{
    opacity:0.4;
    text-shadow: 0 0 5px rgba(255,255,255,0.2);
  }
  50%{
    opacity:1;
    text-shadow: 
      0 0 10px rgba(255,255,255,0.6),
      0 0 20px rgba(255,255,255,0.4);
  }
  100%{
    opacity:0.4;
    text-shadow: 0 0 5px rgba(255,255,255,0.2);
  }
}
  
  .cancelar{
  background: gray;
}

.confirmar{
  background: white;
}
  
  .modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:flex;
  justify-content:center;
  align-items:center;

  background:rgba(0,0,0,0.4);
  backdrop-filter: blur(0px);

  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.modal.active{
  opacity:1;
  pointer-events:auto;
  backdrop-filter: blur(12px);
}

.modal-box{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border:1px solid rgba(255,255,255,0.2);
  padding:25px;
  border-radius:20px;
  width:300px;
  text-align:center;
  animation: pop 0.3s ease;
}

@keyframes pop{
  from{transform:scale(0.8); opacity:0;}
  to{transform:scale(1); opacity:1;}
}
  
body{
  font-family: Arial;
  background:black;
  color:white;
  margin:0;
  text-align:center;

   animation: entrada 0.5s ease;
}

h1{
  margin:20px;
  font-size:42px;
  letter-spacing:3px;
  text-shadow:0 0 10px rgba(255,255,255,0.6),
              0 0 20px rgba(255,255,255,0.5),
              0 0 40px rgba(255,255,255,0.3);
  animation: glow 3s infinite;
}

@keyframes glow{
  0%{text-shadow:0 0 10px rgba(255,255,255,0.4);}
  50%{text-shadow:0 0 30px rgba(255,255,255,0.9);}
  100%{text-shadow:0 0 10px rgba(255,255,255,0.4);}
}

.back-btn, .admin-btn{
  position:fixed;
  top:10px;
  width:35px;
  height:35px;
  border:none;
  border-radius:50%;
  background:white;
  cursor:pointer;
}

.back-btn{ left:10px; }
.admin-btn{ right:10px; }

.contenedor{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.producto{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding:15px;
  border-radius:20px;
  width:220px;
  position:relative;
  overflow:hidden;

  transition:0.4s ease;
  animation: fadeUp 0.6s ease forwards;
}

.producto:hover{
  transform: translateY(-12px) scale(1.04);
  box-shadow: 0 0 40px rgba(255,255,255,0.2);
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform: translateY(30px);
  }
  to{
    opacity:1;
    transform: translateY(0);
  }
}

@keyframes aparecerCard{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.producto:hover{
  transform:translateY(-10px) scale(1.03);
}

.producto img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
}

.btn{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:white;
  color:black;

  position:relative;
  overflow:hidden;

  transition:0.3s;
}
  
.btn:first-of-type{
  background: linear-gradient(45deg, white, #eaeaea);
}
  
/* brillo animado */
.btn::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.6),
    transparent
  );
  transition:0.5s;
}

/* movimiento del brillo */
.btn:hover::after{
  left:100%;
}

/* efecto hover */
.btn:hover{
  box-shadow:0 0 20px rgba(255,255,255,0.8);
  transform:scale(1.05);
}

.precio{
  margin-top:5px;
  font-weight:bold;
}

.agotado{
  position:absolute;
  top:10px;
  left:10px;
  background:linear-gradient(45deg,red,orange);
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
}

</style>
</head>

<body>

<button class="back-btn" onclick="location.href='index.html'">⬅</button>
<button class="admin-btn" onclick="adminMode()">✏️</button>

<h1>Mercado Mangotex</h1>
<p class="subtitulo">Perfumería</p>
  
<div class="contenedor" id="perfumes"></div>

<!-- MODAL -->
<div id="modalCompra" class="modal">
  <div class="modal-box">
    <h3>Confirmar compra</h3>
    <p id="textoCompra"></p>
    <button class="btn cancelar" onclick="cerrarModal()">Cancelar</button>
    <button class="btn confirmar" onclick="confirmarCompra()">Confirmar</button>
  </div>
</div>

  <!-- 👇 PEGAS AQUÍ EL NUEVO -->
<div id="modalInfo" class="modal">
  <div class="modal-box">
    <h3 id="tituloInfo"></h3>
    <p id="descripcionInfo"></p>
    <button onclick="cerrarInfo()">Cerrar</button>
  </div>
</div>
  
<script>
  
  function info(nombre){
  document.getElementById("tituloInfo").innerText = nombre;
  document.getElementById("descripcionInfo").innerText =
    descripciones[nombre] || "Sin descripción disponible.";

  document.getElementById("modalInfo").classList.add("active");
}

function cerrarInfo(){
  document.getElementById("modalInfo").classList.remove("active");
}
  
  let descripciones = {

  "MYSLF L'ABSOLU": `
Fragancia intensa de Yves Saint Laurent con un toque moderno y elegante.

🔥 Uso: perfecto para noche, citas o eventos importantes  
⏳ Duración: alta (6-8 horas)  
🌿 Aroma: fresco especiado con fondo cálido  

💡 Dato: es la versión más intensa de la línea MYSLF, pensada para destacar presencia.
`,

  "Jordan Power": `
Inspirada en Michael Jordan, refleja fuerza, ambición y energía.

🔥 Uso: diario o gym vibes  
⏳ Duración: media  
🌿 Aroma: fresco especiado  

💡 Dato: busca transmitir la mentalidad ganadora del deporte.
`,

  "Nautica Blue": `
Fragancia acuática fresca creada por Maurice Roucel.

🔥 Uso: calor, playa, escuela  
⏳ Duración: media  
🌿 Notas: piña, jazmín, sándalo  

💡 Dato: muy ligera y juvenil, ideal para uso diario.
`,

  "Nautica Voyage": `
Clásico acuático con toque verde y limpio.

🔥 Uso: diario, oficina  
⏳ Duración: media-alta  
🌿 Notas: manzana, loto, almizcle  

💡 Dato: uno de los perfumes más recomendados para empezar.
`,

  "Prada Paradigme": `
Fragancia moderna y elegante lanzada en 2025.

🔥 Uso: elegante, eventos  
⏳ Duración: alta  
🌿 Notas: bergamota, geranio, maderas  

💡 Dato: mezcla lo clásico con lo moderno de Prada.
`,

  "Stronger With You": `
Perfume cálido y dulce de Giorgio Armani.

🔥 Uso: citas, noche  
⏳ Duración: alta  
🌿 Notas: vainilla, castaña, lavanda  

💡 Dato: famoso por su aroma adictivo.
`,

  "Valentino Uomo": `
Fragancia inspirada en Roma con estilo elegante.

🔥 Uso: formal, noche  
⏳ Duración: media-alta  
🌿 Notas: vetiver, salvia, jengibre  

💡 Dato: representa personalidad y estilo único.
`,

  "Valentino Intense": `
Versión intensa de Born in Roma.

🔥 Uso: noche, fiestas  
⏳ Duración: alta  
🌿 Notas: vainilla, lavanda, vetiver  

💡 Dato: mezcla frescura con sensualidad profunda.
`,

  "Versace Eau Fraiche": `
Fragancia fresca y lujosa.

🔥 Uso: calor, verano  
⏳ Duración: media  
🌿 Notas: limón, cedro, ámbar  

💡 Dato: sensación de lujo fresco y limpio.
`,

  "Carolina Herrera": `
Fragancia elegante y sofisticada.

🔥 Uso: eventos, noche  
⏳ Duración: alta  
🌿 Aroma: dulce amaderado  

💡 Dato: marca conocida por perfumes premium.
`
};

  function editar(i){
  let n = prompt("Nombre:", perfumes[i][0]);
  let p10 = prompt("Precio 10ml:", perfumes[i][1]);
  let p5 = prompt("Precio 5ml:", perfumes[i][2]);
  let img = prompt("Imagen URL:", perfumes[i][3]);

  if(!n) return;

  perfumes[i] = [n, p10, p5, img];

  localStorage.setItem("perfumes", JSON.stringify(perfumes));
  cargar();
}

  function agotar(i){
  let agotados = JSON.parse(localStorage.getItem("agotados")) || [];

  if(agotados.includes(i)){
    agotados = agotados.filter(x => x !== i);
  }else{
    agotados.push(i);
  }

  localStorage.setItem("agotados", JSON.stringify(agotados));
  cargar();
}

let admin = false;
let productoActual = "";
let tamañoActual = "";

let perfumes = [];

try{
  perfumes = JSON.parse(localStorage.getItem("perfumes")) || [];
}catch{
  perfumes = [];
}

// limpiar datos rotos (null, incompletos, etc.)
perfumes = perfumes.filter(p =>
  Array.isArray(p) &&
  p.length === 4 &&
  p[0] && p[1] && p[2] && p[3]
);

if(perfumes.length === 0){
  perfumes = [
    ["Carolina Herrera",120,90,"https://picsum.photos/200"],
    ["Jordan Power",110,80,"https://picsum.photos/200"],
    ["MYSLF L'ABSOLU",180,160,"https://picsum.photos/200"],
    ["Nautica Blue",70,50,"https://picsum.photos/200"],
    ["Nautica Voyage",60,40,"https://picsum.photos/200"],
    ["Prada Paradigme",170,150,"https://picsum.photos/200"],
    ["Stronger With You",190,170,"https://picsum.photos/200"],
    ["Valentino Intense",130,100,"https://picsum.photos/200"],
    ["Valentino Uomo",120,90,"https://picsum.photos/200"],
    ["Versace Eau Fraiche",140,110,"https://picsum.photos/200"]
  ];
}

// ordenar siempre (aunque ya haya datos guardados)
perfumes.sort((a,b) => a[0].localeCompare(b[0]));
  
function cargar(){
  let cont = document.getElementById("perfumes");
  cont.innerHTML = "";

  let agotados = [];
  try{
    agotados = JSON.parse(localStorage.getItem("agotados")) || [];
  }catch{
    agotados = [];
  }

  perfumes = perfumes.filter(p =>
    Array.isArray(p) &&
    p.length === 4 &&
    p[0] && p[1] && p[2] && p[3]
  );

  perfumes.forEach((p,i)=>{

    let esAgotado = agotados.includes(i);

    cont.innerHTML += `
      <div class="producto">

        ${esAgotado ? `<div class="agotado">AGOTADO</div>` : ""}

        <img src="${p[3]}" onclick="info('${p[0]}')">

        <h3>${p[0]}</h3>

        <select onchange="precio(this,${p[1]},${p[2]})" ${esAgotado ? "disabled" : ""}>
          <option value="10">10 ML - $${p[1]}</option>
          <option value="5">5 ML - $${p[2]}</option>
        </select>

        <div class="precio">$${p[1]}</div>

        <button class="btn" onclick="abrirCompra('${p[0]}', this)">
          COMPRAR
        </button>

        ${admin ? `
          <button class="btn" onclick="agotar(${i})">
            ${esAgotado ? "DISPONIBLE" : "AGOTAR"}
          </button>

          <button class="btn" onclick="editar(${i})">
            EDITAR
          </button>
        ` : ""}

      </div>
    `;
  });
}

function precio(sel,p10,p5){
  let div = sel.parentElement.querySelector(".precio");
  div.innerText = sel.value=="5" ? "$"+p5 : "$"+p10;
}

function abrirCompra(nombre,btn){
  let sel = btn.parentElement.querySelector("select");

  tamañoActual = sel.value;
  productoActual = nombre;

  document.getElementById("textoCompra").innerText =
    `¿Comprar ${nombre} de ${tamañoActual}ml?`;

  document.getElementById("modalCompra").classList.add("active");
}

function cerrarModal(){
  document.getElementById("modalCompra").classList.remove("active");
}

function confirmarCompra(){
  let msg = `Hola, quiero comprar ${productoActual} de ${tamañoActual}ml`;
  let url = "https://wa.me/526624637282?text=" + encodeURIComponent(msg);
  window.location.href = url;
}

function adminMode(){
  let pass = prompt("Contraseña:");

  if(pass !== "MT-MERCADO2026zz") return;

  admin = !admin;
  alert(admin ? "Admin activado" : "Admin desactivado");
  cargar();
}

window.onload = cargar;

</script>

</body>
</html>
