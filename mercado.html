<!DOCTYPE html>
<html>
<head>
  <title>Mercado Mangotex</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: white;
      color: black;
      text-align: center;
    }

    h1 {
      margin: 40px;
    }

    .contenedor {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .producto {
      width: 250px;
      text-align: left;
    }

    .producto img {
      width: 100%;
      border-radius: 10px;
    }

    select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: black;
      color: white;
      border: none;
      margin-top: 15px;
      cursor: pointer;
    }
  </style>

</head>

<body>

<h1>MERCADO 🥭</h1>

<div class="contenedor">

  <div class="producto">
    <img src="https://via.placeholder.com/250">
    <h3>DECANT DE PERFUME</h3>
    <select>
      <option>5 ML</option>
      <option>10 ML</option>
    </select>
    <button class="btn">COMPRAR</button>
  </div>

  <div class="producto">
    <img src="https://via.placeholder.com/250">
    <h3>CHICLES</h3>
    <select>
      <option>Individual</option>
      <option>Paquete</option>
    </select>
    <button class="btn">COMPRAR</button>
  </div>

  <div class="producto">
    <img src="https://via.placeholder.com/250">
    <h3>COHETES</h3>
    <select>
      <option>Pequeño</option>
      <option>Grande</option>
    </select>
    <button class="btn">COMPRAR</button>
  </div>

</div>

</body>
</html>
