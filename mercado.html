<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mangotex - Mercado</title>

<style>
  body{
    font-family: Arial;
    background:black;
    color:white;
    margin:0;
    text-align:center;
  }

  h1{ margin:20px 0; }

  .contenedor{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
  }

  .producto{
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:15px;
    width:200px;
    position:relative;
  }

  .producto img{
    width:100%;
    border-radius:10px;
    cursor:pointer;
  }

  .btn{
    margin-top:10px;
    padding:8px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:white;
    color:black;
  }

  select{
    margin-top:10px;
    padding:5px;
    border-radius:5px;
  }

  .precio{
    margin-top:5px;
    font-weight:bold;
  }

  .agotado{
    position:absolute;
    top:10px;
    left:10px;
    background:red;
    padding:5px;
    border-radius:5px;
    font-size:12px;
  }

  .admin-btn{
    position:fixed;
    top:10px;
    right:10px;
    background:white;
    border-radius:50%;
    width:35px;
    height:35px;
    border:none;
    cursor:pointer;
  }
</style>
</head>

<body>

<button class="admin-btn" onclick="adminMode()">✏️</button>

<h1>Mercado Mangotex</h1>

<div class="contenedor" id="perfumes"></div>

<script>
let admin = false;

// Datos iniciales
let perfumes = JSON.parse(localStorage.getItem("perfumes")) || [
  ["Valentino Uomo",100,70,"https://picsum.photos/200"],
  ["YSL MYSLF",180,165,"https://picsum.photos/200"],
  ["Nautica Voyage",60,40,"https://picsum.photos/200"],
  ["Stronger With You",190,190,"https://picsum.photos/200"]
];

// Guardar datos
function guardar(){
  localStorage.setItem("perfumes", JSON.stringify(perfumes));
}

// Cargar productos
function cargar(){
  let cont = document.getElementById("perfumes");
  if(!cont) return;

  cont.innerHTML = "";

  let agotados = JSON.parse(localStorage.getItem("agotados")) || [];

  perfumes.forEach((p,i)=>{

    if(!p || !p[0]) return;

    let esAgotado = agotados.includes(i);

    cont.innerHTML += `
      <div class="producto">
        ${esAgotado ? `<div class="agotado">AGOTADO</div>` : ""}

        <img src="${p[3] || 'https://picsum.photos/200'}"
             onerror="this.src='https://picsum.photos/200'"
             onclick="info('${p[0]} fragancia premium.')">

        <h3>${p[0]}</h3>

        <select onchange="precio(this,${p[1]},${p[2]})" ${esAgotado ? "disabled" : ""}>
          ${
            p[1]==p[2]
            ? `<option>5 ML - $${p[2]}</option>`
            : `
              <option value="10">10 ML - $${p[1]}</option>
              <option value="5">5 ML - $${p[2]}</option>
            `
          }
        </select>

        <div class="precio">$${p[1]}</div>

        <button class="btn"
          onclick="confirmar('${p[0]}')"
          ${esAgotado ? "disabled style='background:gray;'" : ""}>
          COMPRAR
        </button>

        ${admin ? `
          <button onclick="agotado(${i})">AGOTAR</button>
          <button onclick="editar(${i})">EDITAR</button>
        ` : ""}
      </div>
    `;
  });
}

// Cambiar precio dinámico
function precio(sel,p10,p5){
  let div = sel.parentElement.querySelector(".precio");
  div.innerText = sel.value == "5" ? "$"+p5 : "$"+p10;
}

// Confirmar compra
function confirmar(nombre){
  let ok = confirm("¿Comprar " + nombre + "?");
  if(ok){
    alert("Se enviará mensaje por WhatsApp");
  }
}

// Info producto
function info(texto){
  alert(texto);
}

// Admin login
function adminMode(){
  let pass = prompt("Contraseña:");
  if(pass === "MT-MERCADO2026zz"){
    admin = !admin;
    alert(admin ? "Admin activado" : "Admin desactivado");
    cargar();
  } else {
    alert("Incorrecto");
  }
}

// Marcar agotado
function agotado(i){
  let agotados = JSON.parse(localStorage.getItem("agotados")) || [];

  if(!agotados.includes(i)){
    agotados.push(i);
  }

  localStorage.setItem("agotados", JSON.stringify(agotados));
  cargar();
}

// Editar producto
function editar(i){
  let n = prompt("Nombre:", perfumes[i][0]);
  let p10 = prompt("Precio 10ml:", perfumes[i][1]);
  let p5 = prompt("Precio 5ml:", perfumes[i][2]);
  let img = prompt("Imagen URL:", perfumes[i][3]);

  perfumes[i] = [n, p10, p5, img];
  guardar();
  cargar();
}

// Iniciar
window.onload = cargar;
</script>

</body>
</html>
