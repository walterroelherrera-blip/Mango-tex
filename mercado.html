<!DOCTYPE html>
<html>
<head>
  <title>Mercado Mangotex</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: black;
    }

    nav {
      position: fixed;
      width: 100%;
      background: rgba(0,0,0,0.6);
      padding: 15px;
      text-align: center;
      z-index: 1000;
    }

    nav button {
      background: transparent;
      border: 1px solid white;
      color: white;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 20px;
      cursor: pointer;
    }

    /* BOTÓN ADMIN */
    .admin-btn {
      position: fixed;
      top: 15px;
      right: 15px;
      background: white;
      color: black;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 20px;
      border: none;
    }

    section {
      padding: 120px 20px;
      text-align: center;
    }

    .contenedor {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
    }

    .producto {
      width: 250px;
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 10px;
      position: relative;
    }

    .producto img {
      width: 100%;
      border-radius: 10px;
      cursor: pointer;
    }

    .agotado {
      position: absolute;
      top: 10px;
      left: 10px;
      background: red;
      padding: 5px;
      font-size: 12px;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    .btn {
      background: white;
      color: black;
      border: none;
      cursor: pointer;
    }

    .precio {
      margin-top: 10px;
      font-weight: bold;
    }

    /* MODAL */
    .overlay {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .modal {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      max-width: 300px;
    }

  </style>

</head>

<body>

<nav>
  <button onclick="window.location.href='index.html'">Inicio</button>
</nav>

<button class="admin-btn" onclick="activarAdmin()">✏️</button>

<section>
  <h1>MERCADO 🥭</h1>
</section>

<section>
  <h1>Perfumería</h1>

  <div class="contenedor" id="productos">

    <!-- PRODUCTOS -->
    
    <script>
      const productos = [
        ["Valentino Uomo",100,70,"https://www.valentino-beauty.com/dw/image/v2/BBPF_PRD/on/demandware.static/-/Sites-valentino-master-catalog/default/dw2d7b2c74/images/large/3614272732153.jpg"],
        ["Valentino Intense",120,90,"https://m.media-amazon.com/images/I/71k6qgq6yDL.jpg"],
        ["YSL MYSLF",180,165,"https://m.media-amazon.com/images/I/61j3X0LZ0pL.jpg"],
        ["Nautica Voyage",60,40,"https://m.media-amazon.com/images/I/71M+oC0K8TL.jpg"],
        ["Nautica Blue",70,60,"https://m.media-amazon.com/images/I/61vF6pKq7UL.jpg"],
        ["Carolina Herrera",90,50,"https://m.media-amazon.com/images/I/61MZ3YlJZDL.jpg"],
        ["Jordan Power",100,60,"https://via.placeholder.com/250"],
        ["Versace Eau Fraiche",180,90,"https://m.media-amazon.com/images/I/61W9F8g9Q1L.jpg"],
        ["Stronger With You",190,190,"https://m.media-amazon.com/images/I/61Y4Lk3JwUL.jpg"],
        ["Prada Paradigme",80,80,"https://m.media-amazon.com/images/I/61wZ9gqvBQL.jpg"]
      ];

      let admin = false;

      function cargar(){
        let cont = document.getElementById("productos");
        cont.innerHTML = "";

        productos.forEach((p,i)=>{
          cont.innerHTML += `
          <div class="producto" id="prod${i}">
            <img src="${p[3]}" onclick="info('${p[0]}: fragancia premium.')">
            <h3>${p[0]}</h3>

            <select onchange="precio(this,${p[1]},${p[2]})">
              ${p[1]==p[2] ? `<option>5 ML - $${p[2]}</option>` :
              `<option value="10">10 ML - $${p[1]}</option>
               <option value="5">5 ML - $${p[2]}</option>`}
            </select>

            <div class="precio">$${p[1]}</div>

            <button class="btn" onclick="confirmar('${p[0]}',this)">COMPRAR</button>

            ${admin ? `<button onclick="toggle(${i})">AGOTAR</button>` : ``}
          </div>
          `;
        });
      }

      function precio(sel,p10,p5){
        let val = sel.value;
        let pr = val=="5"?p5:p10;
        sel.parentElement.querySelector(".precio").innerText="$"+pr;
      }

      function confirmar(prod,btn){
        let p = btn.parentElement;
        let tamaño = p.querySelector("select").value;
        let precio = p.querySelector(".precio").innerText;

        mostrar(`
          <h3>Confirmar compra</h3>
          <p>${prod}</p>
          <p>${tamaño} - ${precio}</p>
          <button onclick="enviar('${prod}','${tamaño}','${precio}')">SI</button>
          <button onclick="cerrar()">NO</button>
        `);
      }

      function enviar(prod,tam,precio){
        let url = "https://wa.me/526624637282?text="+encodeURIComponent(
          `Compra Mangotex:
Producto: ${prod}
Tamaño: ${tam}
Precio: ${precio}`
        );
        window.open(url,"_blank");
        cerrar();
      }

      function info(texto){
        mostrar(`<h3>Información</h3><p>${texto}</p><button onclick="cerrar()">Cerrar</button>`);
      }

      function mostrar(html){
        let o = document.getElementById("overlay");
        o.style.display="flex";
        document.getElementById("modal").innerHTML=html;
      }

      function cerrar(){
        document.getElementById("overlay").style.display="none";
      }

      function activarAdmin(){
        admin = !admin;
        cargar();
      }

      function toggle(i){
        let el = document.getElementById("prod"+i);
        if(el.querySelector(".agotado")){
          el.querySelector(".agotado").remove();
        } else {
          el.innerHTML += `<div class="agotado">AGOTADO</div>`;
        }
      }

      window.onload = cargar;
    </script>

  </div>
</section>

<div id="overlay" class="overlay">
  <div id="modal" class="modal"></div>
</div>

</body>
</html>
