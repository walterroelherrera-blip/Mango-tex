<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mangotex - Mercado</title>

<style>
body{
  font-family: Arial;
  background:black;
  color:white;
  margin:0;
  text-align:center;
}

h1{
  margin:20px;
  font-size:42px;
  letter-spacing:3px;
  text-shadow:0 0 10px rgba(255,255,255,0.6),
              0 0 20px rgba(255,255,255,0.5),
              0 0 40px rgba(255,255,255,0.3);
  animation: glow 3s infinite;
}

@keyframes glow{
  0%{text-shadow:0 0 10px rgba(255,255,255,0.4);}
  50%{text-shadow:0 0 30px rgba(255,255,255,0.9);}
  100%{text-shadow:0 0 10px rgba(255,255,255,0.4);}
}

.back-btn, .admin-btn{
  position:fixed;
  top:10px;
  width:35px;
  height:35px;
  border:none;
  border-radius:50%;
  background:white;
  cursor:pointer;
}

.back-btn{ left:10px; }
.admin-btn{ right:10px; }

.contenedor{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.producto{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  padding:15px;
  border-radius:20px;
  width:220px;
  position:relative;
  transition:0.3s;
}

.producto:hover{
  transform:translateY(-10px) scale(1.03);
}

.producto img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
}

.btn{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:20px;
  background:white;
  cursor:pointer;
}

.precio{
  margin-top:5px;
  font-weight:bold;
}

.agotado{
  position:absolute;
  top:10px;
  left:10px;
  background:linear-gradient(45deg,red,orange);
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
}

.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
}

.modal.active{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:#111;
  padding:20px;
  border-radius:15px;
  width:300px;
}

</style>
</head>

<body>

<button class="back-btn" onclick="location.href='index.html'">⬅</button>
<button class="admin-btn" onclick="adminMode()">✏️</button>

<h1>Mercado Mangotex</h1>

<div class="contenedor" id="perfumes"></div>

<!-- MODAL -->
<div id="modalCompra" class="modal">
  <div class="modal-box">
    <h3>Confirmar compra</h3>
    <p id="textoCompra"></p>
    <button onclick="cerrarModal()">Cancelar</button>
    <button onclick="confirmarCompra()">Confirmar</button>
  </div>
</div>

<script>

let admin = false;
let productoActual = "";
let tamañoActual = "";

let perfumes = JSON.parse(localStorage.getItem("perfumes")) || [];

if(perfumes.length === 0){
  perfumes = [
    ["Valentino Uomo",100,70,"https://picsum.photos/200"],
    ["Valentino Intense",120,90,"https://picsum.photos/200"],
    ["YSL MYSLF",180,165,"https://picsum.photos/200"],
    ["Nautica Voyage",60,40,"https://picsum.photos/200"],
    ["Stronger With You",190,190,"https://picsum.photos/200"]
  ];
}

function cargar(){
  let cont = document.getElementById("perfumes");
  cont.innerHTML = "";

  perfumes.forEach((p,i)=>{
    cont.innerHTML += `
      <div class="producto">
        <img src="${p[3]}">
        <h3>${p[0]}</h3>

        <select onchange="precio(this,${p[1]},${p[2]})">
          <option value="10">10 ML - $${p[1]}</option>
          <option value="5">5 ML - $${p[2]}</option>
        </select>

        <div class="precio">$${p[1]}</div>

        <button class="btn" onclick="abrirCompra('${p[0]}', this)">COMPRAR</button>
      </div>
    `;
  });
}

function precio(sel,p10,p5){
  let div = sel.parentElement.querySelector(".precio");
  div.innerText = sel.value=="5" ? "$"+p5 : "$"+p10;
}

function abrirCompra(nombre,btn){
  let sel = btn.parentElement.querySelector("select");

  tamañoActual = sel.value;
  productoActual = nombre;

  document.getElementById("textoCompra").innerText =
    `¿Comprar ${nombre} de ${tamañoActual}ml?`;

  document.getElementById("modalCompra").classList.add("active");
}

function cerrarModal(){
  document.getElementById("modalCompra").classList.remove("active");
}

function confirmarCompra(){
  let msg = `Hola, quiero comprar ${productoActual} de ${tamañoActual}ml`;
  let url = "https://wa.me/526624637282?text=" + encodeURIComponent(msg);
  window.location.href = url;
}

function adminMode(){
  let pass = prompt("Contraseña:");
  if(pass==="MT-MERCADO2026zz"){
    let n = prompt("Nombre");
    let p10 = prompt("Precio 10ml");
    let p5 = prompt("Precio 5ml");
    let img = prompt("Imagen URL");

    perfumes.push([n,p10,p5,img]);
    localStorage.setItem("perfumes", JSON.stringify(perfumes));
    cargar();
  }
}

window.onload = cargar;

</script>

</body>
</html>
